  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <ellipse cx="200" cy="150" rx="400" ry="300" fill="rgba(108,143,255,0.08)"/>
  <ellipse cx="1000" cy="500" rx="350" ry="250" fill="rgba(62,207,130,0.06)"/>
  <!-- Top badge -->
