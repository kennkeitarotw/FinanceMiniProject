  <text x="940" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#6c8fff" font-weight="700" text-anchor="middle" letter-spacing="1">BANKING IN TAIWAN</text>
  <text x="940" y="225" font-family="Georgia,serif" font-size="38" fill="#ecedf8" text-anchor="middle">Interest Rate</text>
  <text x="940" y="268" font-family="system-ui,sans-serif" font-size="22" fill="#9b9cb8" text-anchor="middle">利率 · lì lǜ</text>
  <rect x="760" y="370" width="360" height="220" rx="20" fill="rgba(30,31,46,0.7)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
